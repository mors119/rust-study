<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket 클라이언트</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🚀 WebSocket 클라이언트</h1>
        <p>Rust 서버와 실시간 통신하는 웹 클라이언트</p>
      </div>

      <div class="main-content">
        <!-- 연결 상태 및 제어 패널 -->
        <div class="connection-panel">
          <div class="connection-row">
            <div id="status" class="status disconnected">연결 끊김</div>
            <button id="connectBtn" class="btn btn-success" onclick="connect()">
              연결
            </button>
            <button
              id="disconnectBtn"
              class="btn btn-danger"
              onclick="disconnect()"
              disabled>
              연결 끊기
            </button>
          </div>
        </div>

        <!-- 사용자 입력 -->
        <div class="input-group">
          <input
            type="text"
            id="usernameInput"
            placeholder="사용자 이름 (선택사항)"
            value="웹클라이언트" />
        </div>

        <!-- 제어 버튼들 -->
        <div class="controls">
          <button
            id="binaryBtn"
            class="btn btn-primary"
            onclick="sendBinary()"
            disabled>
            📁 바이너리 전송
          </button>
          <button
            id="testBtn"
            class="btn btn-warning"
            onclick="sendTestMessages()"
            disabled>
            🧪 테스트 메시지
          </button>
          <button class="btn btn-secondary" onclick="clearMessages()">
            🗑️ 메시지 지우기
          </button>
        </div>

        <!-- 채팅 영역 -->
        <div class="chat-area">
          <div id="messages" class="messages">
            <!-- 메시지들이 여기에 동적으로 추가됩니다 -->
          </div>

          <div class="send-area">
            <div class="send-row">
              <input
                type="text"
                id="messageInput"
                placeholder="메시지를 입력하세요..."
                disabled />
              <button
                id="sendBtn"
                class="btn btn-primary"
                onclick="sendMessage()"
                disabled>
                📤 전송
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
